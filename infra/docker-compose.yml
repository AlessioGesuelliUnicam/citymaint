services:
  db:
    image: postgis/postgis:15-3.4
    container_name: citymaint_db
    environment:
      POSTGRES_USER: citymaint
      POSTGRES_PASSWORD: citymaint_dev
      POSTGRES_DB: citymaint_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: citymaint_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: